<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 28px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #4f46e5; }

    button.add-btn {
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #4338ca; }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .todo-item:last-child { border-bottom: none; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f46e5;
    }

    .todo-title {
      flex: 1;
      font-size: 15px;
      color: #333;
      transition: all 0.2s;
    }

    .todo-title.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 15px;
    }

    .status {
      font-size: 13px;
      color: #888;
      margin-top: 16px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My TODO List</h1>
    <p class="subtitle">3-Tier App — Node.js + MySQL + Docker</p>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="What needs to be done?" />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <ul class="todo-list" id="todoList">
      <li class="empty">Loading todos...</li>
    </ul>

    <p class="status" id="status"></p>
  </div>

  <script>
    // API base URL — empty string means same host (goes through Nginx proxy)
    const API = '/api/todos';

    // Load all todos when page opens
    window.onload = loadTodos;

    // Also add todo when user presses Enter
    document.getElementById('todoInput')
      .addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
      });

    async function loadTodos() {
      try {
        const res   = await fetch(API);
        const todos = await res.json();
        renderTodos(todos);
      } catch (err) {
        document.getElementById('todoList').innerHTML =
          '<li class="empty">Could not connect to server</li>';
      }
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;

      await fetch(API, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ title })
      });

      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id) {
      await fetch(`${API}/${id}`, { method: 'PUT' });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    function renderTodos(todos) {
      const list = document.getElementById('todoList');
      const status = document.getElementById('status');

      if (todos.length === 0) {
        list.innerHTML = '<li class="empty">No todos yet — add one above!</li>';
        status.textContent = '';
        return;
      }

      const done  = todos.filter(t => t.completed).length;
      status.textContent = `${done} of ${todos.length} completed`;

      list.innerHTML = todos.map(todo => `
        <li class="todo-item">
          <input
            type="checkbox"
            ${todo.completed ? 'checked' : ''}
            onchange="toggleTodo(${todo.id})"
          />
          <span class="todo-title ${todo.completed ? 'done' : ''}">
            ${todo.title}
          </span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">×</button>
        </li>
      `).join('');
    }
  </script>
</body>
</html>
