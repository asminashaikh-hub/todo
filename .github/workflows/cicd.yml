name: TO-DO APP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


#set environment variable so that it is available to all the jobs

env:
  $Docker_user: ${{secrets.DOCKER_USERNAME}}
  $App_name: ${{secrets.DOCKER_USERNAME}}/todo-app
  $Web_name: ${{secrets.DOCKER_USERNAME}}/todo-web


#create jobs : 
  
jobs:
  build-test-push:
    name: build->test->plan
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependancy-path: app/package-lock.json 
      
      - name: Install npm packages (node_module)
        working-directory: ./app 
        run: npm install 

      - name: Run Test
        working-directory: ./app
        run: |
          echo "Test are running"
          node -e "
            const express = require('express');
            console.log('Express available');
            const mysql = require('mysql2');
            console.log('Mysql available');
            console.log('All dependencies available'); 
            "
       
    #modern docker engine to build images that are  platform independent,better caching and fast builds
       - name: docker buildx setup
         uses: docker/setup-buildx-action@v4

     #login the docker hub
       - name: docker login
         uses: docker/login-action@v3
         with:
           username: ${{secrets.DOCKER_USERNAME}}
           password: ${{secrets.DOCKER_TOKEN}}

      #build the image and push app image
        - name: docker-app image
          uses: docker/build-push-action@v5
          with:
            context: ./app
            dockerfile: ./app/Dockerfile
            push: ${{ github.ref == 'refs/heads/main' }}
            tags: |
              ${{env.App_name}}:latest
              ${{env.App_name}}:${{github.sha}}

            cache-from: type=gha
            cache-to: type=gha,mode=max

    #build and push the web image 
       - name: docker-web image
         uses: docker/build-push-action@v5
         with:
           context: ./web
           dockerfile: ./web/Dockerfile
           push: ${{github.ref == 'refs/head/main' }}
           tags: |
             ${{env.Web_name}}:latest
             ${{env.Web_name}}:${{github.sha}}
           
           cache-from: type=gha
           cache-to: type=gha,mode=max

    
      #print logs:
         -name: Docker image are pushed
          run: |
            echo -e "${{env.App_name}}:latest \n ${{env.App_name}}:${{github.sha}}
                     \n${{env.Web_name}}:latest \n ${{env.Web_name}}:${{github.sha}}"


              








