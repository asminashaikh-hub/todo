version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: todo_mysql
    restart: always
    environment:
       MYSQL_ROOT_PASSWORD: rootpass
       MYSQL_DATABASE: tododb

    ports:
      - "3306:3306"
    volumes:
      - todo_mysql_data:/var/lib/mysql
    networks:
      - todo-network

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: todo_app
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: tododb
      PORT: 3000

    ports:
     - "3000:3000"

    depends_on:
      db:
        condition: service_healthy
    networks:
      - todo-network
        

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: todo_web
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - app
    networks:
      - todo-network

volumes:
  todo_mysql_data:
networks:
  todo-network:
    driver: bridge

       
